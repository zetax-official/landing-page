<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대표님 유형 진단 — 재택스</title>

  <meta property="og:title" content="나는 어떤 대표일까?" />
  <meta property="og:description" content="20가지 질문으로 알아보는 대표님 업무스타일" />
  <meta property="og:image" content="https://zetax.co.kr/type/og-image.png" />
  <meta property="og:url" content="https://zetax.co.kr/type/" />
  <meta name="description" content="20가지 질문으로 알아보는 대표님 업무스타일" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111;
      --blue: #2563EB;
      --blue-dark: #1d4ed8;
      --blue-light: #eff6ff;
      --white: #fff;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-500: #888;
      --gray-700: #444;
      --accent: #1a1a1a;
      --radius: 16px;
      --font: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
    }

    /* ───── SCREENS ───── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ───── INTRO ───── */
    #screen-intro {
      background: var(--blue-light);
      color: var(--black);
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .intro-badge {
      display: inline-block;
      background: rgba(37,99,235,0.1);
      color: var(--blue);
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .intro-title {
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: var(--black);
      word-break: keep-all;
    }
    .intro-title em { font-style: normal; color: var(--blue); }
    .intro-sub {
      font-size: 15px;
      color: var(--gray-500);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn-start {
      display: block;
      width: 100%;
      max-width: 320px;
      background: var(--blue);
      color: var(--white);
      font-size: 17px;
      font-weight: 700;
      padding: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin: 0 auto;
    }
    .btn-start:active { opacity: 0.85; }
    .btn-share-intro {
      display: block;
      width: 100%;
      max-width: 320px;
      background: #FEE500;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin: 12px auto 0;
    }

    /* ───── QUIZ ───── */
    #screen-quiz {
      background: var(--white);
      padding: 0;
    }
    .quiz-header {
      padding: 16px 24px 14px;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 10;
    }
    .quiz-progress-label {
      display: flex;
      justify-content: flex-end;
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 10px;
    }
    .quiz-progress-bar {
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .quiz-body {
      padding: 32px 24px 40px;
      flex: 1;
    }
    .quiz-question {
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 36px;
      color: var(--black);
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quiz-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 15px;
      color: var(--gray-700);
      background: var(--white);
      width: 100%;
      text-align: left;
    }
    .quiz-option:active { background: var(--gray-100); }
    .quiz-option.selected {
      border-color: var(--blue);
      background: var(--blue);
      color: var(--white);
    }
    .option-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--gray-200);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    .quiz-option.selected .option-dot {
      background: var(--white);
      border-color: var(--white);
    }
    .quiz-option.selected .option-dot::after {
      content: '✓';
      color: var(--blue);
      font-weight: 900;
    }
    .quiz-option-label { flex: 1; line-height: 1.4; }

    /* ───── RESULT ───── */
    #screen-result {
      background: var(--gray-100);
    }
    .result-hero {
      background: var(--blue);
      color: var(--white);
      padding: 48px 24px 40px;
      text-align: center;
    }
    .result-type-name {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 800;
      margin-bottom: 12px;
    }
    .result-tagline {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }
    .result-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .result-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
    }
    .result-card h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gray-500);
      margin-bottom: 12px;
    }
    .result-card p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--gray-700);
    }
    .result-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-card ul li {
      font-size: 15px;
      color: var(--gray-700);
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .result-card ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--black);
      font-weight: 700;
    }
    .result-card.strength ul li::before {
      content: '✓';
      color: var(--blue);
      font-weight: 700;
    }
    .result-card.weakness ul li::before {
      content: '·';
      color: var(--gray-500);
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
    }
    .result-plan-card {
      padding: 8px 0 0;
      text-align: center;
    }
    .result-plan-card p {
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .btn-consult {
      display: block;
      width: 100%;
      background: var(--blue);
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      padding: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    .btn-consult:active { background: var(--blue-dark); }
    .result-share {
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-retry {
      display: block;
      width: 100%;
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      font-weight: 600;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid var(--gray-200);
      cursor: pointer;
      text-align: center;
    }
    .btn-share {
      display: block;
      width: 100%;
      background: #FEE500;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     INTRO
══════════════════════════════════════ -->
<section id="screen-intro" class="screen active">
  <div class="intro-badge">대표님 유형 진단 × 재택스</div>
  <h1 class="intro-title">나는 어떤 <em>대표</em>일까?</h1>
  <p class="intro-sub">
    20가지 질문으로 알아보는<br>
    대표님 업무스타일
  </p>
  <button class="btn-start" onclick="startQuiz()">지금 바로 진단하기 →</button>
  <button class="btn-share-intro" onclick="shareKakao()">카카오톡으로 공유하기</button>
</section>

<!-- ══════════════════════════════════════
     QUIZ
══════════════════════════════════════ -->

  <div class="quiz-body">
<p class="quiz-question" id="q-text"></p>
    <div class="quiz-options" id="q-options"></div>
  </div>
</section>

<!-- ══════════════════════════════════════
     RESULT
══════════════════════════════════════ -->
<section id="screen-result" class="screen">

    <div class="result-tagline" id="r-tagline"></div>
  </div>

    <div class="result-card strength">
      <h3>대표님의 강점</h3>
      <ul id="r-strength"></ul>
    </div>
    <div class="result-card weakness">
      <h3>아쉬운 점</h3>
      <ul id="r-weakness"></ul>
    </div>
    <div class="result-card">
      <h3>지금 당장 해볼 것</h3>
      <ul id="r-solution"></ul>
    </div>
    <div class="result-plan-card">
      <p>혼자 하려니 막막하신가요?</p>
      <button class="btn-consult" onclick="openConsult()">재택스 알아보기 →</button>
    </div>
  </div>
  <div class="result-share">
    <button class="btn-share" onclick="shareKakao()">카카오톡으로 공유하기</button>
    <button class="btn-retry" onclick="retryQuiz()">다시 진단하기</button>
  </div>
</section>

// 상태
// ══════════════════════════════════════
var currentQ = 0;
var answers = new Array(QUESTIONS.length).fill(null);

// ══════════════════════════════════════
// 화면 전환
// ══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════
// 퀴즈 렌더링
// ══════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('q-count-label').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / total) * 100}%`;
  document.getElementById('q-text').textContent = q.text;

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  OPTIONS.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-dot"></span><span class="quiz-option-label">${opt.label}</span>`;
    btn.onclick = () => selectOption(i);
    optContainer.appendChild(btn);
  });
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
    btn.disabled = true;
  });
  setTimeout(() => {
    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

// ══════════════════════════════════════
// 결과 계산
// ══════════════════════════════════════
function calcType() {
  const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  const opposite = { E: 'I', I: 'E', S: 'N', N: 'S', T: 'F', F: 'T', J: 'P', P: 'J' };

  QUESTIONS.forEach((q, i) => {
    const score = OPTIONS[answers[i] ?? 2].score;
    const pos = q.positive;
    const neg = opposite[pos];
    scores[pos] += score;
    scores[neg] += (6 - score);
  });

  const E_I = scores.E >= scores.I ? 'E' : 'I';
  const S_N = scores.S >= scores.N ? 'S' : 'N';
  const T_F = scores.T >= scores.F ? 'T' : 'F';
  const J_P = scores.J >= scores.P ? 'J' : 'P';
  return E_I + S_N + T_F + J_P;
}

function showResult() {
  const code = calcType();
  const type = TYPES[code];


  document.getElementById('r-name').textContent = type.name;
  document.getElementById('r-tagline').textContent = type.tagline;
  document.getElementById('r-trait').textContent = type.trait;

  document.getElementById('r-strength').innerHTML = type.strength.map(s => `<li>${s}</li>`).join('');
  document.getElementById('r-weakness').innerHTML = type.weakness.map(w => `<li>${w}</li>`).join('');
  document.getElementById('r-solution').innerHTML = type.solution.map(s => `<li>${s}</li>`).join('');

  showScreen('screen-result');
}

function previewResult() {
  answers = new Array(QUESTIONS.length).fill(0);

function startQuiz() {
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  showScreen('screen-quiz');

}
